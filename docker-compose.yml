version: '3.8'

services:
  # Laravel App Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: INV-inventory-app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: INV_inventory
      DB_USERNAME: root
      DB_PASSWORD: kakasql10
    depends_on:
      - db

  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: INV-inventory-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: INV_inventory
      MYSQL_ROOT_PASSWORD: kakasql10
    volumes:
      - mysql-db-data:/var/lib/mysql

volumes:
  mysql-db-data:
